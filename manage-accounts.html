<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Accounts - Tweak Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #121212; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .manage-card { background: #181818; padding: 30px; border-radius: 16px; border: 1px solid #333; text-align: center; width: 360px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        h1 { color: #ff2a5f; font-size: 24px; margin-bottom: 10px; }
        p { color: #b3b3b3; font-size: 14px; margin-bottom: 25px; }
        .account-item { 
            background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s;
        }
        .account-item:hover { border-color: #ff2a5f; }
        .account-info { text-align: left; }
        .account-name { font-weight: 600; display: block; }
        .account-type { font-size: 11px; color: #888; text-transform: uppercase; }
        .delete-btn { 
            background: rgba(255, 42, 95, 0.1); color: #ff2a5f; border: 1px solid #ff2a5f; 
            padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 600; 
        }
        .delete-btn:hover { background: #ff2a5f; color: white; }
        .back-link { display: block; margin-top: 20px; color: #b3b3b3; text-decoration: none; font-size: 13px; }
        .empty-state { padding: 20px; color: #555; font-style: italic; }
    </style>
</head>
<body>
    <div class="manage-card">
        <h1>Delete Account</h1>
        <p>Select the account data you wish to remove from this device.</p>
        
        <div id="accountList">
            </div>

        <a href="login.html" class="back-link">← Return to Login</a>
    </div>

    <script>
       // This function looks for the "tweak_accounts" list created in login.html
    function renderAccounts() {
        const list = document.getElementById('accountList');
        const accounts = JSON.parse(localStorage.getItem('tweak_accounts') || "[]");
        
        list.innerHTML = '';

        if (accounts.length === 0) {
            list.innerHTML = '<div class="empty-state">No saved accounts found on this device.</div>';
            return;
        }

        accounts.forEach(user => {
            const div = document.createElement('div');
            div.className = 'account-item';
            div.innerHTML = `
                <div class="account-info">
                    <span class="account-name">${user}</span>
                    <span class="account-type">Saved Account</span>
                </div>
                <button class="delete-btn" onclick="confirmDeletion('${user}')">Delete</button>
            `;
            list.appendChild(div);
        });
    }

    // This handles the permanent removal of account data
    function confirmDeletion(username) {
        if (confirm(`Permanently delete all data for ${username}?`)) {
            // 1. Remove from the "tweak_accounts" Registry
            let accounts = JSON.parse(localStorage.getItem('tweak_accounts') || "[]");
            accounts = accounts.filter(u => u !== username);
            localStorage.setItem('tweak_accounts', JSON.stringify(accounts));

            // 2. Remove from "tweak_session_history" (Admin Panel logs)
            let history = JSON.parse(localStorage.getItem('tweak_session_history') || "[]");
            history = history.filter(h => h.user !== username);
            localStorage.setItem('tweak_session_history', JSON.stringify(history));

            // 3. Log out if deleting the current user
            if (localStorage.getItem('userName') === username) {
                localStorage.removeItem('userName');
                localStorage.removeItem('isLoggedIn');
            }

            renderAccounts(); // Refresh the list immediately
        }
    }

    // Run the renderer when the page opens
    window.onload = renderAccounts;
</script>
    </script>
</body>
</html>
