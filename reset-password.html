<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Tweak Music</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff2a5f; --bg: #121212; --card: #181818; --input-bg: #2a2a2a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .reset-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { color: var(--accent); margin-bottom: 25px; font-weight: 700; font-size: 24px; letter-spacing: -1px; }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        
        .field-wrapper { position: relative; width: 100%; }
        input { width: 100%; padding: 12px 15px; background: var(--input-bg); border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.2s; font-size: 14px; }
        input:focus { border-color: var(--accent); }
        
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; font-size: 14px; }
        .toggle-password:hover { color: var(--accent); }

        .validation-item { font-size: 10px; margin-top: 4px; color: #555; transition: 0.3s; }
        .validation-item.success { color: #1db954; font-weight: 600; }

        .reset-btn { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 30px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .reset-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }
        
        a { color: #666; font-size: 12px; text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="reset-card">
        <h1>New Password</h1>
        
        <div class="input-group">
            <label>Confirm Email</label>
            <input type="email" id="resetEmail" placeholder="Enter registered email" oninput="validateForm()">
        </div>

        <div class="input-group">
            <label>New Password</label>
            <div class="field-wrapper">
                <input type="password" id="newPassword" placeholder="••••••••" oninput="validateForm()">
                <i class="fa-solid fa-eye-slash toggle-password" onclick="toggleVisibility('newPassword', this)"></i>
            </div>
            <div id="reqs" style="margin-top: 8px;">
                <div id="reqLength" class="validation-item">• Min. 8 characters</div>
                <div id="reqUpper" class="validation-item">• One uppercase letter</div>
                <div id="reqSpecial" class="validation-item">• One special character (!@#$)</div>
            </div>
        </div>

        <div class="input-group">
            <label>Repeat Password</label>
            <div class="field-wrapper">
                <input type="password" id="confirmNewPassword" placeholder="••••••••" oninput="validateForm()">
                <i class="fa-solid fa-eye-slash toggle-password" onclick="toggleVisibility('confirmNewPassword', this)"></i>
            </div>
            <div id="matchMsg" class="validation-item"></div>
        </div>

        <button class="reset-btn" id="resetBtn" onclick="processPasswordReset()" disabled>Update Password</button>
        <div style="margin-top: 20px;">
            <a href="login.html">Back to Sign In</a>
        </div>
    </div>

    <script>
        (function() { emailjs.init("eUN1Mra0X09Pw1Qs-"); })();

        function toggleVisibility(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        function validateForm() {
            const email = document.getElementById('resetEmail').value.trim();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            const btn = document.getElementById('resetBtn');

            const isLong = pass.length >= 8;
            const hasUpper = /[A-Z]/.test(pass);
            const hasSpecial = /[!@#$%^&*]/.test(pass);
            const isMatching = pass === confirm && confirm !== "";

            document.getElementById('reqLength').className = isLong ? 'validation-item success' : 'validation-item';
            document.getElementById('reqUpper').className = hasUpper ? 'validation-item success' : 'validation-item';
            document.getElementById('reqSpecial').className = hasSpecial ? 'validation-item success' : 'validation-item';
            
            const matchMsg = document.getElementById('matchMsg');
            if (confirm) {
                matchMsg.innerText = isMatching ? "• Passwords match" : "• Passwords do not match";
                matchMsg.className = isMatching ? 'validation-item success' : 'validation-item';
            } else {
                matchMsg.innerText = "";
            }

            btn.disabled = !(email.includes('@') && isLong && hasUpper && hasSpecial && isMatching);
        }

        function processPasswordReset() {
            const email = document.getElementById('resetEmail').value.trim();
            const pass = document.getElementById('newPassword').value;
            const btn = document.getElementById('resetBtn');

            let accounts = JSON.parse(localStorage.getItem('tweak_accounts_data') || "[]");
            let userIndex = accounts.findIndex(acc => acc.email === email);

            if (userIndex === -1) {
                return alert("No account found with that email address.");
            }

            // Update Database
            accounts[userIndex].password = pass;
            localStorage.setItem('tweak_accounts_data', JSON.stringify(accounts));

            btn.disabled = true;
            btn.innerText = "Processing...";

            // Match EmailJS Dashboard subject: Tweak Music : {{subject_type}}
            const templateParams = {
                to_email: email,
                name: accounts[userIndex].username || "Tweak User",
                subject_type: "Security Alert",
                message: "Your password was successfully updated. If you did not perform this action, please secure your account immediately.",
                recovery_url: window.location.origin + "/login.html"
            };

            emailjs.send("service_i554v5c", "template_5k5jykh", templateParams)
                .then(() => {
                    alert("Success! Password updated.");
                    window.location.href = 'login.html';
                })
                .catch((err) => {
                    console.error("Email error:", err);
                    alert("Success! Password updated locally.");
                    window.location.href = 'login.html';
                });
        }
    </script>
</body>
</html>
